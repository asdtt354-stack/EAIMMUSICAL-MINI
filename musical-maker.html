<body>
<div id="root"></div>
<div id="toast"></div>
<script>
'use strict';
const LS = {
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const SESSION='mm_session',DRAFT_KEY='mm_draft',WORKS_CACHE='mm_works_cache',SETTINGS_CACHE='mm_settings_cache';

// ══════════════════════════
// 🔥 Firebase 설정 — 플랫폼의 모든 앱과 동일한 값을 넣어주세요.
// ══════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBalg0f5x0ydfHxn_nzgZ1pAELvJw6PzoY",
  authDomain: "eaim-classroom.firebaseapp.com",
  projectId: "eaim-classroom",
  storageBucket: "eaim-classroom.firebasestorage.app",
  messagingSenderId: "294479576192",
  appId: "1:294479576192:web:c60e994e319dbd2f11ba65"
};
let db = null, auth = null, firebaseReady = false;
try {
  if (!firebaseConfig.apiKey.startsWith('여기에')) {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    firebaseReady = true;
  }
} catch(e) { console.error('Firebase 초기화 실패', e); }

// ══════════════════════════
// 👩‍🏫 선생님별 데이터 분리 구조: teachers/{uid}/...
// ══════════════════════════
const teacherDoc = (uid) => db.collection('teachers').doc(uid);
const settingsDoc = (uid) => teacherDoc(uid).collection('meta').doc('settings');
const worksCol = (uid) => teacherDoc(uid).collection('works');

let authLoaded = false, currentUser = null; // currentUser: 로그인한 선생님(Firebase Auth user)
let teacherUid = null; // 지금 화면이 보고 있는 데이터의 소유자 uid (선생님 본인 uid 또는 학생이 접속한 링크의 teacher uid)
let settings = LS.get(SETTINGS_CACHE, {apiKey:'', classOn:false});
let works = LS.get(WORKS_CACHE, []);
let unsubSettings = null, unsubWorks = null;

function initAuth(cb){
  if(!firebaseReady){ authLoaded = true; cb && cb(); return; }
  auth.onAuthStateChanged(user=>{
    currentUser = user;
    authLoaded = true;
    cb && cb();
  });
}

function googleLogin(){
  const err=document.getElementById('login-err');
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e=>{ if(err) err.textContent = '로그인 실패: '+e.message; });
}

function teacherLogout(){
  if(unsubSettings){unsubSettings();unsubSettings=null;}
  if(unsubWorks){unsubWorks();unsubWorks=null;}
  if(firebaseReady) auth.signOut();
  session=null;LS.set(SESSION,null);teacherUid=null;
  render();
}

function studentLogout(){
  if(unsubSettings){unsubSettings();unsubSettings=null;}
  session=null;LS.set(SESSION,null);
  render();
}

function subscribeSettings(uid, cb){
  if(unsubSettings) unsubSettings();
  if(!firebaseReady){ cb && cb(); return; }
  unsubSettings = settingsDoc(uid).onSnapshot(snap=>{
    settings = snap.exists ? snap.data() : {apiKey:'', classOn:false};
    LS.set(SETTINGS_CACHE, settings);
    cb && cb();
  }, err=>{ console.warn('설정 동기화 오류', err); cb && cb(); });
}

function setSettings(uid, fields){
  settings = {...settings, ...fields}; LS.set(SETTINGS_CACHE, settings);
  if(firebaseReady){

function maskName(number, fullName){
  const num = String(number).padStart(2,'0');
  const trimmed = (fullName||'').trim();
  const masked = trimmed.length >= 2 ? trimmed[0] + '*'.repeat(trimmed.length - 1) : trimmed;
  return `${num} ${masked}`;
}

async function callGemini(prompt, attempt=0){
  const key=settings.apiKey;
  if(!key)throw new Error('API 키가 설정되지 않았어요. 선생님께 문의하세요.');
  const MAX_RETRIES=3; // 최대 3번 재시도 (총 4번 시도)
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key.trim()}`;
  let res=null, networkErr=null;
  try{
    res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.9,maxOutputTokens:4000}})});
  }catch(e){ networkErr=e; }
  // 429(요청 과다), 503(서버 과부하), 500(일시적 서버 오류)는 재시도할 가치가 있어요
  const retriable = networkErr || res.status===429 || res.status===503 || res.status===500;
  if(retriable && attempt<MAX_RETRIES){
    const waitMs = 800*Math.pow(2,attempt) + Math.random()*400; // 지수 백오프 + 약간의 지터
    const pm=document.getElementById('prog-msg');
    if(pm) pm.textContent = `서버가 잠시 혼잡해요, 자동으로 다시 시도할게요... (${attempt+1}/${MAX_RETRIES})`;
    await new Promise(r=>setTimeout(r,waitMs));
    return callGemini(prompt, attempt+1);
  }
  if(networkErr) throw new Error('네트워크 오류가 계속돼요: '+networkErr.message);
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`오류 ${res.status}`);}
  const data=await res.json();return data.candidates?.[0]?.content?.parts?.[0]?.text||'';
}
function parseJSON(text){const c=text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();return JSON.parse(c);}

      <div class="prog-step" id="ps-3"><span class="sicon">🎭</span>각 막 장면 작성</div>
      <div class="prog-step" id="ps-4"><span class="sicon">🎪</span>커튼콜 작성</div>
      <div class="prog-step" id="ps-5"><span class="sicon">🎵</span>Suno & 이미지 프롬프트 완성</div>
    </div>
    <div id="prog-msg" style="font-size:.72rem;color:var(--sub);margin-top:8px"></div>
  </div>`;
  const setStep=(n,msg='')=>{
    for(let i=1;i<=5;i++){const el=document.getElementById(`ps-${i}`);if(!el)return;
      if(i<n){el.className='prog-step done';el.querySelector('.sicon').textContent='✓';}
      else if(i===n){el.className='prog-step active';}else{el.className='prog-step';}}
    const pm=document.getElementById('prog-msg');if(pm)pm.textContent=msg;
  };
  try{
    setStep(1,'전체 구성 설계 중...');
    const s1=await callGemini(`창작 뮤지컬 작가로서 아래 정보로 전체 구조를 설계하세요.
주제: ${theme} | 장르: ${genre} | 등장인물: ${castCount}명 | 배경: ${setting} | 막 수: ${actCount}
JSON만 응답:
{"title":"뮤지컬 제목","characters":["이름(역할)" ${castCount}명 배열],"synopsis":"줄거리 2-3문장","acts":[{"actNum":1,"title":"막제목","summary":"내용 1문장","emotion":"감정"}]}`);
    const struct=parseJSON(s1),charsStr=struct.characters.join(', ');
    setStep(2,'오프닝 코러스 작성 중...');
    const s2=await callGemini(`뮤지컬 "${struct.title}" 오프닝 장면.
줄거리:${struct.synopsis} | 인물:${charsStr} | 장르:${genre}
이 장면은 노래로 시작하기 전에 짧은 대사 장면이 있고, 그다음 오프닝 코러스로 이어집니다.
JSON만:{"dialogue":"무대 지시문과 등장인물 대사. 형식은 줄바꿈으로 구분하고, 지문은 (지문) 형태로, 대사는 '이름: 대사' 형태로 8~12줄 작성. 중학생이 연기하기 자연스러운 구어체로.","songTitle":"넘버제목","lyrics":"가사 4-6줄(줄바꿈)","sunoPrompt":"영문 Suno 프롬프트(50단어이내)","bgPrompt":"영문 배경이미지 프롬프트, 2.5D parallax composition with distinct far background layer(sky/distant scenery), mid layer(buildings/trees/environment), near foreground layer(props/ground details), theatrical stage lighting, --ar 16:9","mood":"분위기 한국어"}`);
    const opening=parseJSON(s2);
    setStep(3,'장면 작성 중...');
    const scenes=[];
    for(const act of struct.acts){
      setStep(3,`${act.actNum}막 "${act.title}" 작성 중...`);
      const sn=await callGemini(`뮤지컬 "${struct.title}" ${act.actNum}막.
내용:${act.summary} | 감정:${act.emotion} | 인물:${charsStr}
이 막은 대사 장면으로 사건이 전개되다가 감정이 고조되는 지점에서 노래로 이어집니다.
JSON만:{"sceneTitle":"${act.title}","dialogue":"무대 지시문과 등장인물 대사. 형식은 줄바꿈으로 구분하고, 지문은 (지문) 형태로, 대사는 '이름: 대사' 형태로 10~16줄 작성. 사건 전개와 인물 간 갈등·대화가 드러나게, 중학생이 연기하기 자연스러운 구어체로.","songTitle":"넘버제목","lyrics":"가사 4-6줄","characters":"등장인물","sunoPrompt":"영문 Suno(50단어이내)","bgPrompt":"영문 배경이미지, 2.5D parallax composition with distinct far background layer(sky/distant scenery), mid layer(buildings/trees/environment), near foreground layer(props/ground details), theatrical stage lighting, --ar 16:9","emotion":"${act.emotion}","mood":"분위기 한국어"}`);
      scenes.push(parseJSON(sn));
    }
    setStep(4,'커튼콜 작성 중...');
    const s4=await callGemini(`뮤지컬 "${struct.title}" 커튼콜.
오프닝가사:${opening.lyrics} | 줄거리:${struct.synopsis} | 인물:${charsStr}
JSON만:{"dialogue":"막이 내리기 직전 짧은 마무리 대사나 전체 인사말. (지문)과 '이름: 대사' 형태로 4~8줄.","songTitle":"커튼콜 제목(Reprise가능)","lyrics":"가사 4-6줄(감동적 마무리)","sunoPrompt":"영문 Suno(emotional finale,50단어이내)","bgPrompt":"영문 배경이미지(grand finale, all cast), 2.5D parallax composition with distinct far background layer(sky/distant scenery), mid layer(buildings/trees/environment), near foreground layer(props/ground details), theatrical stage lighting, --ar 16:9","mood":"분위기 한국어"}`);
    const curtain=parseJSON(s4);
    setStep(5,'완성 정리 중...');
    generatedData={title:struct.title,genre,characters:struct.characters,synopsis:struct.synopsis,setting,opening,scenes,curtain};
    LS.set(DRAFT_KEY,generatedData);saveWork(generatedData);
    await new Promise(r=>setTimeout(r,500));renderResult();
  }catch(e){
    main.innerHTML=`<div class="card" style="text-align:center;padding:32px">
      <div style="font-size:1.2rem;color:#fca5a5;margin-bottom:12px">⚠️ 생성 실패</div>
      <div style="font-size:.82rem;color:var(--sub);margin-bottom:20px">${e.message}</div>
      <button class="btn-sec" onclick="renderStudentInput()">← 돌아가기</button></div>`;
  }
}

function saveWork(d){
  const fullText=buildFullText(d);
  const newId = firebaseReady ? worksCol(teacherUid).doc().id : String(Date.now());
  const work={id:newId,student:studentName||'익명',fullName:studentFullName||'',classNumber:studentNumber||'',title:d.title,genre:d.genre,acts:actCount,cast:castCount,
    time:new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    approved:false,preview:`${d.synopsis}\n\n♪ ${d.opening.songTitle}\n${d.opening.lyrics}`,fullText};
  works=[work,...works];LS.set(WORKS_CACHE,works);
  if(firebaseReady){
    const {id, ...fields} = work;
    worksCol(teacherUid).doc(newId).set({...fields, createdAt:firebase.firestore.FieldValue.serverTimestamp()})
      .catch(e=>showToast('❌ 결과물 클라우드 저장 실패: '+e.message));
  }
}

function buildFullText(d){
  if(!d)return'';
  let t=`${'═'.repeat(48)}\n  ${(d.title||'').toUpperCase()}\n  ${d.genre}\n${'═'.repeat(48)}\n\n`;
  t+=`📖 줄거리\n${d.synopsis}\n\n👥 등장인물\n  ${(d.characters||[]).join('\n  ')}\n\n`;
  t+=`【 오프닝 】\n${'─'.repeat(36)}\n${d.opening.dialogue?d.opening.dialogue+'\n\n':''}♪ ${d.opening.songTitle}\n\n${d.opening.lyrics}\n\n[Suno] ${d.opening.sunoPrompt}\n[BG] ${d.opening.bgPrompt}\n\n`;
  (d.scenes||[]).forEach((s,i)=>{t+=`【 ${i+1}막: ${s.sceneTitle} 】\n${'─'.repeat(36)}\n등장: ${s.characters}\n\n${s.dialogue?s.dialogue+'\n\n':''}♪ ${s.songTitle}\n\n${s.lyrics}\n\n[Suno] ${s.sunoPrompt}\n[BG] ${s.bgPrompt}\n\n`;});
  t+=`【 커튼콜 】\n${'─'.repeat(36)}\n${d.curtain.dialogue?d.curtain.dialogue+'\n\n':''}♪ ${d.curtain.songTitle}\n\n${d.curtain.lyrics}\n\n[Suno] ${d.curtain.sunoPrompt}\n[BG] ${d.curtain.bgPrompt}`;
  return t;
}

function renderResult(){
  const main=document.getElementById('student-main');if(!main||!generatedData)return;
  const d=generatedData;
  main.innerHTML=`<div class="save-bar"><div class="save-status"><div class="save-dot"></div>자동저장 완료</div>
    <div style="font-size:.68rem;color:var(--sub)">수정하면 자동으로 저장됩니다</div></div>
  <div class="r-header">
    <div style="font-size:.62rem;color:var(--sub);letter-spacing:.25em;margin-bottom:6px">✦ EAIM MUSICAL ✦</div>
    <div class="r-title">${d.title}</div>
    <div class="r-sub">${d.genre} · ${actCount}막 · 등장인물 ${castCount}명</div>
  </div>
  <div class="card" style="margin-bottom:14px"><div class="card-title" style="margin-bottom:10px">👥 등장인물</div>
    <div style="font-size:.82rem;color:rgba(255,255,255,.6);line-height:2">${(d.characters||[]).map(c=>`• ${c}`).join('<br>')}</div></div>
  ${renderSceneCard('opening','오프닝 코러스','tag-opening','🌅',d.opening,-1)}
  ${(d.scenes||[]).map((s,i)=>renderSceneCard(`scene-${i}`,`${i+1}막 — ${s.sceneTitle}`,'tag-scene','🎬',s,i)).join('')}
  ${renderSceneCard('curtain','커튼콜','tag-curtain','🎭',d.curtain,-2)}
  <div class="btn-row">
    <button class="btn-sec" onclick="renderStudentInput()">↩ 새로 만들기</button>
    <button class="btn-regen" onclick="startGenerate()">🔄 재생성</button>
    <button class="btn-dl" onclick="downloadAll()">📥 다운로드</button>
    <button class="btn-slide" onclick="launchSlideshow()">🎬 슬라이드쇼</button>
  </div>`;
  main.querySelectorAll('textarea, .prompt-text').forEach(el=>{el.addEventListener('input',()=>{scheduleAutoSave();});});
}

function renderSceneCard(id,label,tagClass,icon,data,idx){
  return `<div class="scene-card">
    <div class="scene-header open" onclick="toggleScene('${id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="scene-tag ${tagClass}">${icon} ${label}</span>
        <span style="font-size:.85rem;font-weight:700;color:var(--text)">♪ ${data.songTitle||''}</span>
      </div>
      <span style="color:rgba(255,255,255,.25);font-size:.72rem" id="arr-${id}">▲</span>
    </div>
    <div class="scene-body" id="body-${id}">
      <div class="edit-label">💬 대사 · 지문</div>
      <textarea class="edit-box" id="dialogue-${id}" rows="8" placeholder="(무대 지시문)&#10;이름: 대사...">${data.dialogue||''}</textarea>
      <div class="edit-label" style="margin-top:14px">🎵 노래 가사</div>
      <textarea class="edit-box" id="lyrics-${id}" rows="6">${data.lyrics||''}</textarea>
      <div class="prompt-grid">
        <div class="prompt-box">
          <div class="prompt-label">🎵 Suno 프롬프트 <button class="w-btn" style="float:right;margin-top:-2px" onclick="copyEl('suno-${id}')">복사</button></div>
          <textarea class="prompt-text" id="suno-${id}" rows="3">${data.sunoPrompt||''}</textarea>
        </div>
        <div class="prompt-box">
          <div class="prompt-label">🖼 배경 프롬프트 <button class="w-btn" style="float:right;margin-top:-2px" onclick="copyEl('bg-${id}')">복사</button></div>
          <textarea class="prompt-text" id="bg-${id}" rows="3">${data.bgPrompt||''}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleScene(id){
  const body=document.getElementById(`body-${id}`),arr=document.getElementById(`arr-${id}`);if(!body)return;
  const isOpen=body.style.display!=='none';body.style.display=isOpen?'none':'block';if(arr)arr.textContent=isOpen?'▼':'▲';
}

function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{
    collectEdits();LS.set(DRAFT_KEY,generatedData);
    const last=works[0];
    if(last){
      last.fullText=buildFullText(generatedData);
      last.preview=`${generatedData.synopsis}\n\n♪ ${generatedData.opening.songTitle}\n${generatedData.opening.lyrics}`;
      LS.set(WORKS_CACHE,works);
      if(firebaseReady && last.id){
        worksCol(teacherUid).doc(String(last.id)).set({fullText:last.fullText, preview:last.preview},{merge:true})
          .catch(e=>console.warn('자동저장 클라우드 반영 실패', e));
      }
    }
    showToast('💾 자동저장 완료');
  },1500);
}

function collectEdits(){
  if(!generatedData)return;
  const getVal=id=>document.getElementById(id)?.value||'';
  generatedData.opening.dialogue=getVal('dialogue-opening');generatedData.opening.lyrics=getVal('lyrics-opening');generatedData.opening.sunoPrompt=getVal('suno-opening');generatedData.opening.bgPrompt=getVal('bg-opening');
  (generatedData.scenes||[]).forEach((_,i)=>{generatedData.scenes[i].dialogue=getVal(`dialogue-scene-${i}`);generatedData.scenes[i].lyrics=getVal(`lyrics-scene-${i}`);generatedData.scenes[i].sunoPrompt=getVal(`suno-scene-${i}`);generatedData.scenes[i].bgPrompt=getVal(`bg-scene-${i}`);});
  generatedData.curtain.dialogue=getVal('dialogue-curtain');generatedData.curtain.lyrics=getVal('lyrics-curtain');generatedData.curtain.sunoPrompt=getVal('suno-curtain');generatedData.curtain.bgPrompt=getVal('bg-curtain');
}

function downloadAll(){
  collectEdits();const text=buildFullText(generatedData);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));
  a.download=`${generatedData?.title||'뮤지컬'}_${studentName||'학생'}.txt`;a.click();
}

function launchSlideshow(){
  collectEdits();const d=generatedData;if(!d)return;
  const scenes=[
    {type:'opening',title:'오프닝 코러스',songTitle:d.opening.songTitle,lyrics:d.opening.lyrics,imagePrompt:d.opening.bgPrompt,characters:(d.characters||[]).join(', '),emotion:'설렘',musicMood:d.opening.mood},
    ...(d.scenes||[]).map(s=>({title:s.sceneTitle,songTitle:s.songTitle,lyrics:s.lyrics,imagePrompt:s.bgPrompt,characters:s.characters,emotion:s.emotion,musicMood:s.mood})),
  ];
  localStorage.setItem('eaim_musical_data',JSON.stringify({
    title:d.title, scenes,
    curtainSongTitle:d.curtain.songTitle,
    curtainLyrics:d.curtain.lyrics,
    curtainBgPrompt:d.curtain.bgPrompt,
    credits:[]
  }));
  window.open('slideshow.html','_blank');
  showToast('🎬 슬라이드쇼로 전송!');
}

function copyEl(id){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.value||el.textContent).then(()=>showToast('✅ 복사됨!'));}
let toastT;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>{el.style.display='none';},2000);}

(function(){
  const params=new URLSearchParams(window.location.search);
  const role=params.get('role');
  const teacherParam=params.get('teacher');
  renderLoading();

  if(role==='student'){
    isStudentMode=true;
    if(!teacherParam){ authLoaded=true; renderNoTeacherLink(); return; }
    teacherUid=teacherParam;
    authLoaded=true;
    subscribeSettings(teacherUid, ()=>{
      if(LS.get(SESSION)==='student'){ session='student'; }else{ session=null; }
      render();
    });
    return;
  }

  // 기본: 교사 로그인 플로우
  initAuth(()=>{
    if(currentUser){
      teacherUid=currentUser.uid;
      session='teacher';LS.set(SESSION,'teacher');
      subscribeSettings(teacherUid, render);
      subscribeWorks(teacherUid);
    }else{
      session=null;
      render();
    }
  });
})();
</script>
</body>
</html>
